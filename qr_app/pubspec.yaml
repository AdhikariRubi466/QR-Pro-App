name: qr_app
description: A professional QR Code Scanner and Generator app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR Code generation widget
  qr_flutter: ^4.1.0

  # Camera-based QR/Barcode scanner (supports Android, iOS, macOS)
  mobile_scanner: ^7.2.0

  # Runtime permission requests (camera)
  permission_handler: ^12.0.1

  # Google Fonts — Inter typeface
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
